<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Workshop Registration</title>
  <style>
    /* ... (Existing styles from your previous code) ... */
    .user-pill { background: #e0e7ff; color: #4338ca; padding: 4px 12px; border-radius: 99px; font-size: 12px; margin-bottom: 15px; display: inline-block; }
    .event-item { border-left: 4px solid #1a56db; padding: 10px; background: #f9fafb; margin-bottom: 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Event Registration</h1>
    
    <div id="auth-gate">
        <p>Please log in with your college account to register.</p>
        <button onclick="window.location.href='/.auth/login/aad'">Login to Register</button>
    </div>

    <div id="main-content" style="display:none;">
        <div id="user-display" class="user-pill"></div>
        
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your Name">

        <label for="event">Select Workshop</label>
        <select id="event">
          <option value="Cloud Workshop">Cloud Workshop – April 2026</option>
          <option value="DevOps Bootcamp">DevOps Bootcamp – May 2026</option>
          <option value="Azure Fundamentals">Azure Fundamentals – June 2026</option>
        </select>

        <button id="reg-btn" onclick="register()">Register Now</button>
        <div class="msg" id="msg" aria-live="polite"></div>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
        <h3>My Registrations</h3>
        <div id="my-events-list" style="margin-top: 15px; font-size: 14px;">Loading...</div>
        
        <div class="admin-link" style="margin-top:30px;">
            <a href="admin.html">Admin Dashboard →</a> | 
            <a href="/.auth/logout">Logout</a>
        </div>
    </div>
  </div>

  <script>
    const API = "https://event-reg-func.azurewebsites.net/api";

    async function checkAuth() {
        try {
            const res = await fetch("/.auth/me");
            const data = await res.json();
            if (data.length > 0) {
                document.getElementById("auth-gate").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                document.getElementById("user-display").textContent = `Logged in: ${data[0].user_id}`;
                loadMyEvents();
            }
        } catch (e) { console.log("Not authenticated"); }
    }

    async function register() {
        const name = document.getElementById("name").value.trim();
        const event = document.getElementById("event").value;
        const msg = document.getElementById("msg");

        if (!name || !event) {
            msg.className = "msg error";
            msg.textContent = "Please enter your name.";
            return;
        }

        try {
            const res = await fetch(`${API}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, event })
            });
            if (res.ok) {
                msg.className = "msg success";
                msg.textContent = "✅ Registration successful!";
                loadMyEvents();
            }
        } catch (e) { msg.className = "msg error"; msg.textContent = "Error connecting to server."; }
    }

    async function loadMyEvents() {
        const res = await fetch(`${API}/get_my_registrations`);
        const data = await res.json();
        const list = document.getElementById("my-events-list");
        if (data.length === 0) {
            list.innerHTML = "<p>You haven't registered for any events yet.</p>";
        } else {
            list.innerHTML = data.map(e => `
                <div class="event-item">
                    <strong>${e.event}</strong><br>
                    <small>Registered: ${new Date(e.registeredAt).toLocaleDateString()}</small>
                </div>
            `).join("");
        }
    }

    window.onload = checkAuth;
  </script>
</body>
</html>
